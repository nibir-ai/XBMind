name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check xbmind/
      - name: Ruff format check
        run: ruff format --check xbmind/

  syntax:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile all Python files
        run: find xbmind -name '*.py' -exec python -m py_compile {} +

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libdbus-1-dev libglib2.0-dev portaudio19-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          # Install CPU-only torch (small download, no CUDA)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Install core deps from requirements.txt
          pip install -r requirements.txt
          # Install openwakeword without tflite-runtime (no 3.13+ wheels)
          pip install openwakeword --no-deps
          pip install scipy scikit-learn tqdm requests
          # Install project in editable mode with dev extras
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v -m "not integration" --tb=short

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libdbus-1-dev libglib2.0-dev portaudio19-dev

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install openwakeword --no-deps
          pip install -e ".[dev]"

      - name: Run mypy
        run: mypy xbmind/ --ignore-missing-imports --no-error-summary || true
